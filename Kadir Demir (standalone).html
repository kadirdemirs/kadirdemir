  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Kadir Demir — Digital Design Studio<\u002Ftitle>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin=\"\">\n<style>/* latin-ext */\n@font-face {\n  font-family: 'Instrument Serif';\n  font-style: italic;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"96be28fb-c436-4fad-9329-bc1683cde845\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Instrument Serif';\n  font-style: italic;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"d44ae3fb-b885-49d6-869a-857c413c533f\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Instrument Serif';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"ffe6bb0f-89c8-4cd5-80b3-109eaffba9d6\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Instrument Serif';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"e19220b8-71d8-490c-8f45-61935ebee2b9\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  :root{\n    --bg:#0c0e0a;\n    --bg2:#111410;\n    --panel:#15180f;\n    --panel2:#191c12;\n    --line:rgba(190,205,140,.12);\n    --line2:rgba(190,205,140,.20);\n    --ink:#e8ead9;\n    --ink2:#9ea08d;\n    --ink3:#6a6c5c;\n    --acc:oklch(0.86 0.17 112);\n    --acc-dim:oklch(0.86 0.17 112 / .14);\n    --sans:\"Helvetica Neue\",Helvetica,Arial,system-ui,sans-serif;\n    --serif:\"Instrument Serif\",Georgia,serif;\n    --maxw:1180px;\n  }\n  *{box-sizing:border-box;margin:0;padding:0}\n  html{scroll-behavior:smooth}\n  body{\n    background:var(--bg);\n    color:var(--ink);\n    font-family:var(--sans);\n    -webkit-font-smoothing:antialiased;\n    line-height:1.5;\n    overflow-x:hidden;\n  }\n  ::selection{background:var(--acc);color:#0c0e0a}\n  a{color:inherit;text-decoration:none}\n  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 28px}\n  .serif{font-family:var(--serif);font-style:italic;font-weight:400}\n  .eyebrow{\n    font-size:11px;letter-spacing:.22em;text-transform:uppercase;\n    color:var(--ink3);font-weight:600;display:flex;align-items:center;gap:10px;\n  }\n  .eyebrow::before{content:\"\";width:18px;height:1px;background:var(--acc);opacity:.7}\n\n  /* ---------- NAV ---------- */\n  nav{\n    position:fixed;top:0;left:0;right:0;z-index:50;\n    transition:background .3s,border-color .3s,backdrop-filter .3s;\n    border-bottom:1px solid transparent;\n  }\n  nav.scrolled{background:rgba(10,12,8,.78);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}\n  .nav-inner{max-width:var(--maxw);margin:0 auto;padding:16px 28px;display:flex;align-items:center;justify-content:space-between}\n  .brand{display:flex;align-items:center;gap:11px;font-weight:600;letter-spacing:-.01em}\n  .logo{width:30px;height:30px;border:1px solid var(--line2);border-radius:7px;display:grid;place-items:center;background:var(--panel)}\n  .logo span{font-family:var(--serif);font-style:italic;font-size:18px;color:var(--acc);line-height:1}\n  .nav-links{display:flex;gap:30px;font-size:13.5px;color:var(--ink2)}\n  .nav-links a{transition:color .2s}\n  .nav-links a:hover{color:var(--ink)}\n  .nav-right{display:flex;align-items:center;gap:18px}\n  .btn{\n    display:inline-flex;align-items:center;gap:9px;border-radius:999px;\n    font-size:13.5px;font-weight:600;padding:10px 20px;cursor:pointer;\n    border:1px solid transparent;transition:transform .15s,background .2s,border-color .2s,color .2s;\n  }\n  .btn:hover{transform:translateY(-1px)}\n  .btn-primary{background:var(--acc);color:#0c0e0a}\n  .btn-primary:hover{background:oklch(0.9 0.17 112)}\n  .btn-ghost{border-color:var(--line2);color:var(--ink)}\n  .btn-ghost:hover{background:var(--panel);border-color:var(--acc)}\n  .dot{width:7px;height:7px;border-radius:50%;background:var(--acc);box-shadow:0 0 10px var(--acc)}\n  @media(max-width:860px){.nav-links{display:none}}\n\n  /* ---------- HERO ---------- */\n  .hero{position:relative;padding:160px 0 60px;overflow:hidden}\n  .hero-glow{\n    position:absolute;top:-10%;right:-5%;width:780px;height:780px;\n    background:radial-gradient(circle,oklch(0.86 0.17 112 / .14),transparent 62%);\n    pointer-events:none;filter:blur(10px);\n  }\n  .hero-grid{position:absolute;inset:0;opacity:.5;pointer-events:none;\n    background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);\n    background-size:64px 64px;mask-image:radial-gradient(ellipse 80% 60% at 50% 30%,#000,transparent 80%)}\n  .hero-inner{position:relative;display:grid;grid-template-columns:1.05fr .95fr;gap:40px;align-items:center}\n  h1.hero-h{font-size:clamp(38px,5.4vw,72px);line-height:.98;letter-spacing:-.03em;font-weight:700}\n  h1.hero-h .serif{font-size:1.04em;letter-spacing:-.01em}\n  h1.hero-h .acc{color:var(--acc)}\n  .hero-sub{margin-top:24px;color:var(--ink2);font-size:16.5px;max-width:430px;line-height:1.6}\n  .hero-cta{margin-top:34px;display:flex;gap:12px;flex-wrap:wrap}\n  .hero-meta{margin-top:4 x;border-bottom:1px solid var(--line);cursor:pointer;\n    transition:padding-left .25s,background .25s,color .25s;position:relative;\n  }\n  .built-row .idx{font-family:ui-monospace,monospace;font-size:12px;color:var(--ink3)}\n  .built-row .name{font-size:clamp(22px,3vw,34px);font-weight:600;letter-spacing:-.02em;transition:color .2s}\n  .built-row .cat{font-size:13px;color:var(--ink3);text-align:right}\n  .built-row .arrow{width:34px;height:34px;border-radius:50%;border:1px solid var(--line2);display:grid;place-items:center;color:var(--ink2);transition:.2s;opacity:0;transform:translateX(-6px)}\n  .built-row:hover{padding-left:26px;background:linear-gradient(90deg,var(--acc-dim),transparent 60%)}\n  .built-row:hover .name{color:var(--acc)}\n  .built-row:hover .arrow{opacity:1;transform:translateX(0);border-color:var(--acc);color:var(--acc)}\n\n  /* ---------- DISCIPLINES ---------- */\n  .disc-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}\n  .disc{\n    background:linear-gradient(180deg,var(--panel),var(--bg2));\n    border:1px solid var(--line);border-radius:14px;padding:30px 30px 26px;\n    transition:border-color .25s,transform .25s;\n  }\n  .disc:hover{border-color:var(--line2);transform:translateY(-3px)}\n  .disc-ic{width:42px;height:42px;border-radius:10px;border:1px solid var(--line2);display:grid;place-items:center;color:var(--acc);margin-bottom:22px;background:var(--bg)}\n  .disc h3{font-size:21px;font-weight:600;letter-spacing:-.01em;margin-bottom:10px}\n  .disc p{color:var(--ink2);font-size:14px;line-height:1.6;margin-bottom:20px;max-width:90%}\n  .chips{display:flex;flex-wrap:wrap;gap:8px}\n  .chip{font-size:11.5px;color:var(--ink2);border:1px solid var(--line);border-radius:999px;padding:6px 12px;background:var(--bg)}\n  @media(max-width:760px){.disc-grid{grid-template-columns:1fr}}\n\n  /* ---------- PROCESS ---------- */\n  .proc{display:flex;flex-direction:column;gap:18px}\n  .proc-row{\n    display:grid;grid-template-columns:320px 1fr;gap:0;\n    background:linear-gradient(180deg,var(--panel),var(--bg2));\n    border:1px solid var(--line);border-radius:16px;overflow:hidden;\n  }\n  .proc-vis{position:relative;background:radial-gradient(circle at 50% 40%,#1a1d12,#0a0b07);border-right:1px solid var(--line);min-height:230px;display:grid;place-items:center}\n  .wire{width:60%;height:60%;opacity:.85}\n  .proc-body{padding:38px 40px;display:flex;flex-direction:column;justify-content:center}\n  .proc-body .step{font-family:ui-monospace,monospace;font-size:12px;color:var(--acc);margin-bottom:14px;letter-spacing:.08em}\n  .proc-body h3{font-size:30px;font-weight:700;letter-spacing:-.02em;margin-bottom:14px}\n  .proc-body p{color:var(--ink2);font-size:14.5px;line-height:1.65;max-width:520px;margin-bottom:20px}\n  .proc-tags{display:flex;gap:22px;flex-wrap:wrap;font-size:12.5px;color:var(--ink3)}\n  .proc-tags span{display:flex;align-items:center;gap:7px}\n  .proc-tags span::before{content:\"\";width:5px;height:5px;border-radius:50%;background:var(--acc)}\n  @media(max-width:760px){.proc-row{grid-template-columns:1fr}.proc-vis{border-right:none;border-bottom:1px solid var(--line)}}\n\n  /* ---------- STUDIO ---------- */\n  .studio{display:grid;grid-template-columns:1.4fr 1fr;gap:18px;align-items:stretch}\n  .ph{position:relative;border:1px solid var(--line);border-radius:14px;overflow:hidden;background:\n      repeating-linear-gradient(135deg,#15180f,#15180f 11px,#12150d 11px,#12150d 22px)}\n  .ph .ph-tag{position:absolute;bottom:12px;left:12px}\n  .studio .big{min-height:360px}\n  .studio-side{display:grid;grid-template-rows:auto 1fr;gap:18px}\n  .studio-copy{border:1px solid var(--line);border-radius:14px;padding:30px;background:linear-gradient(180deg,var(--panel),var(--bg2))}\n  .studio-copy h3{font-size:26px;font-weight:700;letter-spacing:-.02em;line-height:1.1;margin-bottom:14px}\n  .studio-copy h3 .serif{color:var(--ink2)}\n  .studio-copy p{color:var(--ink2);font-size:14px;line-height:1.6}\n  @media(max-width:760px){.studio{grid-template-columns:1fr}}\n\n  /* ---------- CONTACT ---------- */\n  .contact{display:grid;grid-template-columns:.85fr 1.15fr;gap:48px}\n  .contact-left h2{margin-bottom:22px}\n  .contact-left .line{display:flex;align-items:center;gap:14px;padding:16px 0;border-top:1px solid var(--line);color:var(--ink2);font-size:14.5px}\n  .contact-left .line b{color:var(--ink);font-weight:500;min-width:90px}\n  .form{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line);border-radius:16px;padding:32px}\n  .field{margin-bottom:18px}\n  .field label{display:block;font-size:12px;color:var(--ink3);letter-spacing:.04em;text-transform:uppercase;margin-bottom:8px}\n  .field input,.field textarea,.field select{\n    width:100%;background:var(--bg);border:1px solid var(--line);border-radius:10px;\n    padding:13px 14px;color:var(--ink);font-family:inherit;font-size:14.5px;transition:border-color .2s;\n  }\n  .field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--acc)}\n  .field textarea{resize:vertical;min-height:110px}\n  .two{display:grid;grid-template-columns:1fr 1fr;gap:14px}\n  .budget-row{display:flex;gap:8px;flex-wrap:wrap}\n  .budget-row .chip{cursor:pointer;transition:.2s;user-select:none}\n  .budget-row .chip.active{border-color:var(--acc);color:var(--acc);background:var(--acc-dim)}\n  .form .btn-primary{width:100%;justify-content:center;margin-top:6px;padding:14px}\n  @media(max-width:760px){.contact{grid-template-columns:1fr;gap:30px}.two{grid-template-columns:1fr}}\n\n  /* ---------- FOUNDER ---------- */\n  .founder{display:grid;grid-template-columns:1fr 1.1fr;gap:48px;align-items:center}\n  .founder .ph{min-height:420px}\n  .founder-copy .quote{font-family:var(--serif);font-style:italic;font-size:clamp(26px,3.4vw,40px);line-height:1.18;letter-spacing:-.01em;color:var(--ink)}\n  .founder-copy .quote .acc{color:var(--acc)}\n  .founder-copy p{color:var(--ink2);font-size:14.5px;line-height:1.65;margin-top:24px;max-width:480px}\n  .founder-sign{margin-top:30px;display:flex;align-items:center;gap:28px}\n  .founder-sign .nm{font-family:var(--serif);font-style:italic;font-size:26px}\n  .founder-stat{display:flex;gap:34px;border-left:1px solid var(--line);padding-left:28px}\n  .founder-stat .m b{display:block;font-size:22px;font-weight:600;letter-spacing:-.02em}\n  .founder-stat .m span{font-size:11px;color:var(--ink3);letter-spacing:.06em}\n  @media(max-width:760px){.founder{grid-template-columns:1fr}}\n\n  /* ---------- RESULTS ---------- */\n  .results{background:var(--bg2);border-top:1px solid var(--line);border-bottom:1px solid var(--line)}\n  .res-top{display:grid;grid-template-columns:1.1fr 1fr;gap:48px;margin-bottom:54px}\n  .res-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border:1px solid var(--line);border-radius:14px;overflow:hidden}\n  .res-stats .s{padding:30px 24px;border-right:1px solid var(--line)}\n  .res-stats .s:last-child{border-right:none}\n  .res-stats .s b{font-size:clamp(30px,4vw,46px);font-weight:700;letter-spacing:-.03em;display:block}\n  .res-stats .s b .acc{color:var(--acc)}\n  .res-stats .s span{font-size:12.5px;color:var(--ink3);margin-top:6px;display:block}\n  .res-panel{border:1px solid var(--line);border-radius:14px;padding:28px;background:var(--panel)}\n  .res-panel h3{font-size:18px;font-weight:600;margin-bottom:6px}\n  .res-panel .h-sub{color:var(--ink3);font-size:13px;margin-bottom:22px}\n  .res-bar{display:flex;align-items:center;gap:14px;margin-bottom:14px}\n  .res-bar .lab{width:120px;font-size:12.5px;color:var(--ink2)}\n  .res-bar .track{flex:1;height:7px;background:var(--bg);border-radius:6px;overflow:hidden;border:1px solid var(--line)}\n  .res-bar .fill{height:100%;background:linear-gradient(90deg,oklch(0.5 0.1 112),var(--acc));border-radius:6px;width:0;transition:width 1.1s cubic-bezier(.2,.7,.2,1)}\n  .res-bar .pct{width:42px;text-align:right;font-size:12.5px;color:var(--acc);font-family:ui-monospace,monospace}\n  .res-grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}\n  .res-card{border:1px solid var(--line);border-radius:14px;padding:24px;background:var(--panel)}\n  .res-card h4{font-size:14px;color:var(--ink2);font-weight:500;margin-bottom:18px}\n  .gauge-row{display:flex;gap:22px;flex-wrap:wrap}\n  .gauge{text-align:center}\n  .gauge .circ{width:64px;height:64px;border-radius:50%;display:grid;place-items:center;margin:0 auto 8px;\n    background:conic-gradient(var(--acc) var(--p,90%),var(--bg) 0);position:relative}\n  .gauge .circ::after{content:\"\";position:absolute;inset:6px;border-radius:50%;background:var(--panel)}\n  .gauge .circ b{position:relative;z-index:2;font-size:14px;font-weight:600}\n  .gauge span{font-size:11px;color:var(--ink3)}\n  @media(max-width:760px){.res-top{grid-template-columns:1fr}.res-grid2{grid-template-columns:1fr}}\n\n  /* ---------- FAQ ---------- */\n  .faq{border-top:1px solid var(--line)}\n  .faq-item{border-bottom:1px solid var(--line)}\n  .faq-q{display:flex;align-items:center;justify-content:space-between;gap:20px;padding:24px 4px;cursor:pointer;font-size:clamp(16px,2vw,20px);font-weight:500;transition:color .2s}\n  .faq-q:hover{color:var(--acc)}\n  .faq-q .pm{width:30px;height:30px;border-radius:50%;border:1px solid var(--line2);display:grid;place-items:center;flex-shrink:0;transition:.25s;font-size:18px;color:var(--ink2)}\n  .faq-item.open .pm{transform:rotate(45deg);border-color:var(--acc);color:var(--acc)}\n  .faq-a{max-height:0;overflow:hidden;transition:max-height .35s ease}\n  .faq-a p{color:var(--ink2);font-size:14.5px;line-height:1.65;padding:0 4px 26px;max-width:760px}\n\n  /* ---------- CTA + FOOTER ---------- */\n  .cta{padding:120px 0;text-align:center;position:relative;overflow:hidden}\n  .cta-glow{position:absolute;left:50%;top:40%;transform:translate(-50%,-50%);width:700px;height:400px;\n    background:radial-gradient(ellipse,oklch(0.86 0.17 112 / .12),transparent 70%);pointer-even u002Fcircle><path d=\"M16 50h68M50 16v68M26 26l48 48M74 26L26 74\"><\u002Fpath><circle cx=\"50\" cy=\"50\" r=\"14\" stroke=\"rgba(190,205,140,.9)\"><\u002Fcircle><\u002Fsvg><\u002Fdiv>\n        <div class=\"proc-body\"><div class=\"step\">STEP 01<\u002Fdiv><h3>Strategy<\u002Fh3><p>We map your goals, audience and competition, then turn it into a plan with clear priorities. No design happens until we know what success looks like.<\u002Fp><div class=\"proc-tags\"><span>Discovery<\u002Fspan><span>Positioning<\u002Fspan><span>Roadmap<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"proc-row reveal\">\n        <div class=\"proc-vis\"><svg class=\"wire\" viewBox=\"0 0 100 100\" fill=\"none\" stroke=\"rgba(190,205,140,.55)\" stroke-width=\".6\"><path d=\"M50 8L78 78H22Z\"><\u002Fpath><path d=\"M50 8v70M30 56h40M36 68h28\"><\u002Fpath><circle cx=\"50\" cy=\"34\" r=\"7\" stroke=\"rgba(190,205,140,.9)\"><\u002Fcircle><\u002Fsvg><\u002Fdiv>\n        <div class=\"proc-body\"><div class=\"step\">STEP 02<\u002Fdiv><h3>Design<\u002Fh3><p>We design in high fidelity from day one — interface, brand and motion together — so you see the real thing early and iterate fast with confidence.<\u002Fp><div class=\"proc-tags\"><span>UI / UX<\u002Fspan><span>Identity<\u002Fspan><span>Prototypes<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"proc-row reveal\">\n        <div class=\"proc-vis\"><svg class=\"wire\" viewBox=\"0 0 100 100\" fill=\"none\" stroke=\"rgba(190,205,140,.55)\" stroke-width=\".6\"><path d=\"M50 14L82 32v36L50 86 18 68V32Z\"><\u002Fpath><path d=\"M50 14v36l32-18M50 50L18 32M50 50v36\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div class=\"proc-body\"><div class=\"step\">STEP 03<\u002Fdiv><h3>Build<\u002Fh3><p>Production-grade engineering with the design as the source of truth. Clean code, fast load times and a CMS you can actually run yourself.<\u002Fp><div class=\"proc-tags\"><span>Frontend<\u002Fspan><span>Backend<\u002Fspa iv class=\"circ\" style=\"--p:92%\"><b>92%<\u002Fb><\u002Fdiv><span>Repeat work<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FAQ -->\n<section class=\"sec-pad\" id=\"faq\">\n  <div class=\"wrap\">\n    <div class=\"sec-head reveal\"><h2>Answers, <span class=\"serif\">upfront.<\u002Fspan><\u002Fh2><p>The questions we get asked most — no surprises later.<\u002Fp><\u002Fdiv>\n    <div class=\"faq reveal\">\n      <div class=\"faq-item\"><div class=\"faq-q\">What does a typical project cost?<span class=\"pm\">+<\u002Fspan><\u002Fdiv><div class=\"faq-a\"><p>It depends on scope, but most marketing sites land between €5k–€15k, and custom software starts higher. After a short call we send a fixed, transparent quote — no hourly surprises.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div class=\"faq-item\"><div class=\"faq-q\">How long does it take?<span class=\"pm\">+<\u002Fspan><\u002Fdiv><div class=\"faq-a\"><p>A focused website runs 3–6 weeks. Branding adds 2–3. Software and apps are scoped individually — but we always agree on milestones before we start.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div class=\"faq-item\"><div class=\"faq-q\">Who actually does the work?<span class=\"pm\">+<\u002Fspan><\u002Fdiv><div class=\"faq-a\"><p>A small senior team — and Kadir is hands-on in every project. You won't be passed to a junior after the pitch.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div class=\"faq-item\"><div class=\"faq-q\">Can you work with our existing brand?<span class=\"pm\">+<\u002Fspan><\u002Fdiv><div class=\"faq-a\"><p>Absolutely. We can extend and refine what you have, or rebuild from scratch — whichever serves the goal best.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div class=\"faq-item\"><div class=\"faq-q\">Do you offer support after launch?<span class=\"pm\">+<\u002Fspan><\u002Fdiv><div class=\"faq-a\"><p>Yes. Every launch comes with a care option for monitoring, updates and ongoing improvements — so your product keeps getting better.<\u002Fp><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- CTA -->\n<section class=\"cta\">\n  <div class=\"cta-glow\"><\u002Fdiv>\n  <div class=\"wrap\">\n    <h2 class=\"reveal\">We love to <span class=\"serif acc\">build.<\u002Fspan><\u002Fh2>\n    <p class=\"reveal\">Got something ambitious in mind? Let's make it real.<\u002Fp>\n    <div class=\"hero-cta reveal\"><a class=\"btn btn-primary\" href=\"#contact\">Start a project →<\u002Fa><a class=\"btn btn-ghost\" href=\"#work\">See the work<\u002Fa><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FOOTER -->\n<footer>\n  <div class=\"wrap\">\n    <div class=\"foot-grid\">\n      <div class=\"foot-brand\">\n        <a class=\"brand\" href=\"#top\"><span class=\"logo\"><span>k<\u002Fspan><\u002Fspan>Kadir Demir<\u002Fa>\n        <p>Digital design studio building websites, brands, software and apps for ambitious companies. Based in NRW, Germany.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"foot-col\"><h5>Studio<\u002Fh5><a href=\"#work\">Work<\u002Fa><a href=\"#services\">Services<\u002Fa><a href=\"#process\">Process<\u002Fa><a href=\"#results\">Results<\u002Fa><\u002Fdiv>\n      <div class=\"foot-col\"><h5>Connect<\u002Fh5><a href=\"#contact\">Contact<\u002Fa><a href=\"#\">Instagram<\u002Fa><a href=\"#\">LinkedIn<\u002Fa><a href=\"#\">Dribbble<\u002Fa><\u002Fdiv>\n      <div class=\"foot-col\"><h5>Legal<\u002Fh5><a href=\"#\">Imprint<\u002Fa><a href=\"#\">Privacy<\u002Fa><a href=\"#\">Terms<\u002Fa><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot-bot\">\n      <span>© 2026 Kadir Demir — Digital Design Studio<\u002Fspan>\n      <span>Made with care in North Rhine-Westphalia<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<script>\n  // nav scroll state\n  const nav=document.getElementById('nav');\n  addEventListener('scroll',()=>nav.classList.toggle('scrolled',scrollY>30));\n\n  // reveal on scroll\n  const io=new IntersectionObserver((es)=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}}),{threshold:.12});\n  document.querySelectorAll('.reveal').forEach(el=>io.observe(el));\n\n  // results bars\n  const barIO=new IntersectionObserver((es)=>es.forEach(e=>{if(e.isIntersecting){e.target.querySelectorAll('.fill').forEach(f=>f.style.width=f.dataset.w+'%');barIO.unobserve(e.target);}}),{threshold:.3});\n  document.querySelectorAll('.res-panel').forEach(el=>barIO.observe(el));\n\n  // faq\n  document.querySelectorAll('.faq-q').forEach(q=>q.addEventListener('click',()=>{\n    const item=q.parentElement,open=item.classList.contains('open');\n    document.querySelectorAll('.faq-item').forEach(i=>{i.classList.remove('open');i.querySelector('.faq-a').style.maxHeight=null;});\n    if(!open){item.classList.add('open');const a=item.querySelector('.faq-a');a.style.maxHeight=a.scrollHeight+'px';}\n  }));\n\n  // chip toggles\n  function wireChips(id,multi){\n    document.querySelectorAll('#'+id+' .chip').forEach(c=>c.addEventListener('click',()=>{\n      if(!multi)document.querySelectorAll('#'+id+' .chip').forEach(x=>x.classList.remove('active'));\n      c.classList.toggle('active');\n    }));\n  }\n  wireChips('needRow',true);wireChips('budgetRow',false);\n\n  function submitForm(e){\n    e.preventDefault();\n    const b=document.getElementById('submitBtn');\n    b.textContent='Thanks — we\\u2019ll be in touch ✓';b.style.background='oklch(0.9 0.17 112)';\n    setTimeout(()=>{e.target.reset();document.querySelectorAll('.chip.active').forEach(c=>c.classList.remove('active'));b.textContent='Send message →';},2600);\n    return false;\n  }\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
