<!doctype html>

    <meta charset="UTF-8" />
    <!-- Tema, React mount olmadan uygulanır (FOUC yok): kayıtlı seçim → yoksa varsayılan koyu -->
    <script>
      (function () {
        try {
          var s = localStorage.getItem('theme');
          var t = (s === 'light' || s === 'dark') ? s : 'dark';
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) {}
      })();
    </script>

    <!-- Canonical -->

    <!-- JSON-LD: Person -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Kadir Demir",
      "url": "https://kadirardademir.com",
      "image": "https://kadirardademir.com/favicon.png",
      "jobTitle": "YouTube İçerik Üreticisi",
      "description": "İstanbul'dan yayın yapan bir YouTuber. Oyun, vlog ve eğlence içerikleri üretiyor.",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "İstanbul",
        "addressCountry": "TR"
      },
      "sameAs": [
        "https://youtube.com/@kadirardademirr",
        "https://instagram.com/kadirardademir",
        "https://tiktok.com/@kadirardademir",
        "https://x.com/kadirardademir"
      ]
    }
    </script>

    <!-- JSON-LD: FAQ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Yeni video ne sıklıkla geliyor?",
          "acceptedAnswer": {"@type": "Answer", "text": "Genelde haftada 1-2 video. Yayın takvimini YouTube ve sosyal hesaplardan takip edebilirsin."}
        },
        {
          "@type": "Question",
          "name": "İş birliğine açık mısın?",
          "acceptedAnswer": {"@type": "Answer", "text": "Evet. Kanala uyan marka ve fikirler için thekademedia@gmail.com adresinden ya da iletişim formundan yazabilirsin."}
        },
        {
          "@type": "Question",
          "name": "Tüm bağlantılar nerede?",
          "acceptedAnswer": {"@type": "Answer", "text": "Tüm sosyal medya ve iletişim bağlantıları kadirardademir.com/links sayfasında tek yerde."}
        }
      ]
    }
    </script>
