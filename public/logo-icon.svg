<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 130">
  <defs>
    <linearGradient id="front" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5e058"/>
      <stop offset="55%" stop-color="#eac321"/>
      <stop offset="100%" stop-color="#c9a81e"/>
    </linearGradient>
    <linearGradient id="side" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7a6010"/>
      <stop offset="100%" stop-color="#3e3008"/>
    </linearGradient>
  </defs>

  <!-- Front face: classic flash/lightning bolt shape -->
  <polygon
    points="60,4 20,68 42,68 18,126 64,60 42,60 60,4"
    fill="url(#front)"
  />

  <!-- Left dark face — upper arm -->
  <polygon
    points="60,4 44,4 4,68 20,68"
    fill="url(#side)"
  />

  <!-- Left dark face — lower arm -->
  <polygon
    points="42,68 26,68 2,126 18,126"
    fill="url(#side)"
    opacity="0.88"
  />
</svg>
