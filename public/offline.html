<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>İnternet Bağlantısı Yok | Kadir Demir</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
    }
    .icon { font-size: 4rem; margin-bottom: 16px; }
    h1 { font-size: 1.5rem; margin: 0 0 12px; }
    p { color: #888; margin: 0 0 24px; }
    button {
      padding: 12px 28px;
      background: #eac321;
      color: #0a0a0a;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div>
    <div class="icon">📡</div>
    <h1>İnternet bağlantısı yok</h1>
    <p>Sayfayı görüntülemek için internet bağlantınızı kontrol edin.</p>
    <button onclick="location.reload()">Tekrar Dene</button>
  </div>
</body>
</html>
